name: Markdown Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Write markdownlint config
        run: |
          cat > .markdownlint.json <<'EOF'
          {
            "default": true,
            "MD013": false,
            "MD033": false,
            "MD041": false,
            "MD024": false
          }
          EOF

      - name: Lint Markdown files
        run: |
          markdownlint-cli2 \
            "**/*.md" \
            "!node_modules/**" \
            "!.venv/**" \
            "!site/**"
